name: Update GitHub Stats

on:
  schedule:
    - cron: "0 0 * * *"   # Corre todos los días a medianoche
  workflow_dispatch:        # También se puede correr manualmente
  push:
    branches: [main]

jobs:
  update-stats:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      # Stats generales: actividad, comunidad y repos (SIN lenguajes)
      - name: Generate GitHub Stats SVG
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: zara-te05
          template: classic
          base: header, activity, community, repositories
          config_timezone: America/Mexico_City
          filename: assets/stats.svg
          config_display: large

      # Solo lenguajes (sin base para que no repita el header)
      - name: Generate Top Languages SVG
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: zara-te05
          template: classic
          base: ""
          config_timezone: America/Mexico_City
          filename: assets/langs.svg
          plugin_languages: yes
          plugin_languages_ignored: html, css, dockerfile, jupyter notebook
          plugin_languages_limit: 8
          plugin_languages_sections: most-used
          plugin_languages_details: bytes-size, percentage
          config_display: large

      # Calendario de contribuciones del último año
      - name: Generate Contributions Calendar SVG
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: zara-te05
          template: classic
          base: ""
          config_timezone: America/Mexico_City
          filename: assets/streak.svg
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
          config_display: large
