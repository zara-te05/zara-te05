name: Update GitHub Stats

on:
  schedule:
    - cron: "0 0 * * *"   # Corre todos los días a medianoche
  workflow_dispatch:        # También se puede correr manualmente
  push:
    branches: [main]

jobs:
  update-stats:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Generate GitHub Stats SVG
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: zara-te05
          template: classic
          base: header, activity, community, repositories
          config_timezone: America/Mexico_City
          filename: assets/stats.svg
          plugin_languages: yes
          plugin_languages_ignored: html, css, dockerfile
          plugin_languages_limit: 8
          plugin_languages_sections: most-used
          plugin_languages_details: bytes-size, percentage
          config_display: large

      - name: Generate Top Languages SVG
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: zara-te05
          template: classic
          base: ""
          filename: assets/langs.svg
          plugin_languages: yes
          plugin_languages_ignored: html, css, dockerfile
          plugin_languages_limit: 8
          plugin_languages_sections: most-used
          plugin_languages_details: bytes-size, percentage
          config_display: large

      - name: Generate Streak SVG
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: zara-te05
          template: classic
          base: ""
          filename: assets/streak.svg
          plugin_habits: yes
          plugin_habits_facts: yes
          plugin_habits_charts: yes
          config_display: large
